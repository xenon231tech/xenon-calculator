<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xenon Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .calculator {
            background: #1e1e2f;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 400px;
        }

        .brand {
            text-align: center;
            margin-bottom: 20px;
            color: #667eea;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 2px;
        }

        .display {
            background: #2d2d42;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: right;
        }

        .display input {
            width: 100%;
            background: transparent;
            border: none;
            font-size: 2.5rem;
            color: white;
            text-align: right;
            outline: none;
            font-family: monospace;
        }

        .display .result {
            font-size: 1rem;
            color: #888;
            margin-top: 10px;
            min-height: 24px;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        button {
            background: #2d2d42;
            border: none;
            padding: 20px;
            font-size: 1.3rem;
            font-weight: 600;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            background: #3d3d5a;
            transform: scale(0.98);
        }

        button:active {
            transform: scale(0.95);
        }

        .operator {
            background: #f39c12;
            color: #1e1e2f;
        }

        .operator:hover {
            background: #e67e22;
        }

        .equals {
            background: #27ae60;
            grid-column: span 2;
        }

        .equals:hover {
            background: #2ecc71;
        }

        .clear {
            background: #e74c3c;
        }

        .clear:hover {
            background: #c0392b;
        }

        .zero {
            grid-column: span 2;
        }

        footer {
            text-align: center;
            margin-top: 20px;
            color: #555;
            font-size: 0.7rem;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="brand">
            ⚡ XENON CALCULATOR ⚡
        </div>
        
        <div class="display">
            <input type="text" id="display" value="0" readonly>
            <div class="result" id="result"></div>
        </div>
        
        <div class="buttons">
            <button class="clear" onclick="clearDisplay()">C</button>
            <button class="operator" onclick="deleteLast()">⌫</button>
            <button class="operator" onclick="appendOperator('%')">%</button>
            <button class="operator" onclick="appendOperator('/')">÷</button>
            
            <button onclick="appendNumber('7')">7</button>
            <button onclick="appendNumber('8')">8</button>
            <button onclick="appendNumber('9')">9</button>
            <button class="operator" onclick="appendOperator('*')">×</button>
            
            <button onclick="appendNumber('4')">4</button>
            <button onclick="appendNumber('5')">5</button>
            <button onclick="appendNumber('6')">6</button>
            <button class="operator" onclick="appendOperator('-')">-</button>
            
            <button onclick="appendNumber('1')">1</button>
            <button onclick="appendNumber('2')">2</button>
            <button onclick="appendNumber('3')">3</button>
            <button class="operator" onclick="appendOperator('+')">+</button>
            
            <button class="zero" onclick="appendNumber('0')">0</button>
            <button onclick="appendNumber('.')">.</button>
            <button class="equals" onclick="calculate()">=</button>
        </div>
        
        <footer>
            Xenon Calculator | Built with 💜
        </footer>
    </div>

    <script>
        let currentInput = '0';
        let currentOperator = null;
        let previousInput = null;
        let waitingForOperand = false;

        const display = document.getElementById('display');
        const resultDisplay = document.getElementById('result');

        function updateDisplay() {
            display.value = currentInput;
        }

        function appendNumber(number) {
            if (waitingForOperand) {
                currentInput = number;
                waitingForOperand = false;
            } else {
                if (currentInput === '0' && number !== '.') {
                    currentInput = number;
                } else {
                    currentInput += number;
                }
            }
            updateDisplay();
            resultDisplay.textContent = '';
        }

        function appendOperator(operator) {
            const inputValue = parseFloat(currentInput);
            
            if (previousInput !== null && !waitingForOperand) {
                calculate();
            }
            
            previousInput = inputValue;
            currentOperator = operator;
            waitingForOperand = true;
            resultDisplay.textContent = currentInput + ' ' + getOperatorSymbol(operator);
        }

        function getOperatorSymbol(operator) {
            const symbols = {
                '+': '+',
                '-': '-',
                '*': '×',
                '/': '÷',
                '%': '%'
            };
            return symbols[operator] || operator;
        }

        function calculate() {
            if (currentOperator === null || waitingForOperand) return;
            
            const secondValue = parseFloat(currentInput);
            let result = 0;
            
            switch (currentOperator) {
                case '+':
                    result = previousInput + secondValue;
                    break;
                case '-':
                    result = previousInput - secondValue;
                    break;
                case '*':
                    result = previousInput * secondValue;
                    break;
                case '/':
                    if (secondValue === 0) {
                        resultDisplay.textContent = 'Error: Tidak bisa dibagi 0!';
                        clearDisplay();
                        return;
                    }
                    result = previousInput / secondValue;
                    break;
                case '%':
                    result = previousInput % secondValue;
                    break;
                default:
                    return;
            }
            
            result = Math.round(result * 1000000) / 1000000;
            
            resultDisplay.textContent = previousInput + ' ' + getOperatorSymbol(currentOperator) + ' ' + secondValue + ' =';
            currentInput = result.toString();
            currentOperator = null;
            previousInput = null;
            waitingForOperand = true;
            updateDisplay();
        }

        function clearDisplay() {
            currentInput = '0';
            currentOperator = null;
            previousInput = null;
            waitingForOperand = false;
            updateDisplay();
            resultDisplay.textContent = '';
        }

        function deleteLast() {
            if (currentInput.length === 1 || (currentInput === '0')) {
                currentInput = '0';
            } else {
                currentInput = currentInput.slice(0, -1);
            }
            updateDisplay();
        }

        document.addEventListener('keydown', function(event) {
            const key = event.key;
            
            if (key >= '0' && key <= '9') {
                appendNumber(key);
            } else if (key === '.') {
                appendNumber('.');
            } else if (key === '+' || key === '-' || key === '*' || key === '/') {
                appendOperator(key);
            } else if (key === '%') {
                appendOperator('%');
            } else if (key === 'Enter' || key === '=') {
                calculate();
            } else if (key === 'Escape') {
                clearDisplay();
            } else if (key === 'Backspace') {
                deleteLast();
            }
        });
    </script>
</body>
</html>
